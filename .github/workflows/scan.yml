name: Bias Arbitrage Scanner

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secrets
        run: |
          cat > config.json << 'CONFIGEOF'
          {
            "platforms": ["polymarket"],
            "sport": "UFC",
            "lookahead_days": 7,
            "risk_mode": "conservative",
            "bankroll": {"mode": "paper", "value": 200, "currency": "ZMW"},
            "kelly_fraction": {"conservative": 0.25, "aggressive": 0.75},
            "edge_threshold_pct": {"conservative": 5.0, "aggressive": 3.0},
            "confidence_cutoff": {"conservative": 0.7, "aggressive": 0.5},
            "alert_sort": {"conservative": "calibrated_confidence", "aggressive": "calibrated_confidence_x_payout_multiple"},
            "api_keys": {
              "the_odds_api": "${{ secrets.THE_ODDS_API_KEY }}",
              "llm_api_key": "${{ secrets.LLM_API_KEY }}",
              "llm_provider": "groq",
              "llm_model": "llama-3.1-8b-instant"
            },
            "email": {
              "sender": "${{ secrets.EMAIL_SENDER }}",
              "app_password": "${{ secrets.EMAIL_APP_PASSWORD }}",
              "recipient": "${{ secrets.EMAIL_RECIPIENT }}",
              "dashboard_url": "${{ secrets.DASHBOARD_URL }}"
            }
          }
          CONFIGEOF

      - name: Run data collector
        run: python data_collector.py

      - name: Run scoring
        run: python scoring.py

      - name: Run LLM reasoner
        run: python llm_reasoner.py

      - name: Run alerter
        run: python alerter.py

      - name: Run resolver
        run: python resolver.py

      - name: Run calibrator
        run: python calibrator.py

      - name: Commit updated snapshots and calibration
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          touch snapshots.jsonl calibration.json alerted_ids.json
          git add snapshots.jsonl calibration.json alerted_ids.json
          git diff --staged --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
